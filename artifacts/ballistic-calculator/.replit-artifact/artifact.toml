kind = "web"
previewPath = "/"
title = "Ballistic Calculator"
version = "1.0.0"
id = "artifacts/ballistic-calculator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18167

[services.development]
run = "pnpm --filter @workspace/ballistic-calculator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ballistic-calculator", "run", "build" ]
publicDir = "artifacts/ballistic-calculator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18167"
BASE_PATH = "/"
